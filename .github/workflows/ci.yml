name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit

  e2e-smoke-and-real-pass-fixture:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: E2E smoke
        run: npm run test:e2e:smoke
      - name: Short fixture render + R7
        run: |
          npm run render:fixture
          REAL_PASS_FIXTURE=1 npm run squad:gate:fixture
        env:
          AUTOTUBE_FORCE_CPU: "1"
