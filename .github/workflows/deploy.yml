# NOTE: This workflow is "Build & Push" only — it does NOT deploy to any runtime environment.
# The Docker image is built and pushed to GHCR but requires a separate deployment step.
# TODO: Uncomment the "Deploy to server" step below and configure secrets to enable deployment.
name: Build & Push

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Deployment step (commented out — configure secrets to enable) ──
      # Requires the following GitHub repository secrets:
      #   DEPLOY_HOST   - hostname or IP of the target server
      #   DEPLOY_USER   - SSH username on the target server
      #   DEPLOY_SSH_KEY - private SSH key for authentication
      # After configuring secrets, remove the `if: false` line below.
