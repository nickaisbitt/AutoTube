# Build on ubuntu-amd64 host, package via Dockerfile.runtime, push to GHCR.
# Triggers on master push (after checkout) and after successful CI, or manual dispatch.
name: GHCR image

on:
  push:
    branches: [master]
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      PUPPETEER_SKIP_DOWNLOAD: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install build deps for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev

      - name: npm ci
        run: npm ci --ignore-scripts --prefer-offline

      - name: Rebuild canvas
        run: npm rebuild canvas

      - name: Bootstrap server-render
        run: node deploy/bootstrap-server-render.mjs

      - name: Sync + verify canonical server-render.mjs
        run: |
          node scripts/sync-server-render-deploy.mjs
          node scripts/sync-server-render-deploy.mjs --check

      - name: Vite build
        timeout-minutes: 5
        run: |
          # vite-singlefile can leave the Node process hanging on GHA after "built in Xs"
          npm run build &
          pid=$!
          for _ in $(seq 1 120); do
            if [ -f dist/index.html ]; then
              kill "$pid" 2>/dev/null || true
              wait "$pid" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          kill "$pid" 2>/dev/null || true
          exit 1

      - name: Un-ignore CI build artifacts for runtime image
        run: |
          printf '\n# ghcr-image workflow only\n!node_modules\n!dist\n!src\n' >> .dockerignore

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.runtime
          push: true
          build-args: |
            GIT_COMMIT=${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
            DEPLOY_IMAGE=ghcr.io/nickaisbitt/autotube:${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          tags: |
            ghcr.io/nickaisbitt/autotube:${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
            ghcr.io/nickaisbitt/autotube:latest
