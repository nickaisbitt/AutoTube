name: Deploy to Railway

on:
  push:
    branches: [master, cursor/**]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'nickaisbitt/AutoTube' || github.repository == 'nickaisbitt/autotube'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN secret not set — skipping deploy"
            exit 0
          fi
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh

      - name: Health check
        run: |
          sleep 30
          curl -fsS https://autotube-production.up.railway.app/api/health || echo "Health check failed (service may still be starting)"
