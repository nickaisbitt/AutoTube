openapi: 3.0.3
info:
  title: AutoTube API
  description: API for AutoTube — automated YouTube video generation platform
  version: 1.0.0
  contact:
    name: AutoTube Team

servers:
  - url: http://localhost:5173
    description: Development server

paths:
  /api/health:
    get:
      summary: Health check
      description: Returns server health status including uptime and memory usage.
      operationId: getHealth
      tags:
        - System
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: number
                    description: Server uptime in seconds
                    example: 3600.5
                  memoryUsage:
                    type: object
                    properties:
                      rss:
                        type: number
                      heapTotal:
                        type: number
                      heapUsed:
                        type: number
                      external:
                        type: number
                required:
                  - status
                  - uptime
                  - memoryUsage

  /api/errors:
    get:
      summary: Get recent errors
      description: Returns recent error messages and monitoring data.
      operationId: getErrors
      tags:
        - System
      responses:
        "200":
          description: List of recent errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: object
                  messages:
                    type: array
                    items:
                      type: object
                  total:
                    type: number
                required:
                  - errors
                  - messages
                  - total
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Method not allowed

  /api/server-render:
    post:
      summary: Start server-side render
      description: >
        Spawns a full server-side render using node-canvas, edge-tts, and ffmpeg.
        Requires the project to be saved first via /api/save-project.
        Pass the `path` returned by save-project in the request body.
        Returns SSE progress events.
      operationId: postServerRender
      tags:
        - Render
      requestBody:
        description: Saved project file location from /api/save-project
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                projectPath:
                  type: string
                  description: Absolute path returned by /api/save-project
                  example: /tmp/autotube-project-abc123.json
                projectId:
                  type: string
                  description: Fallback project ID when projectPath is omitted
      responses:
        "200":
          description: SSE stream with render progress
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"type":"progress","message":"Starting server-side render...","pct":0}
                  data: {"type":"progress","message":"Segment 1/5","pct":16}
                  data: {"type":"complete","message":"Server render complete!","pct":100,"filePath":"/api/render-output/mp4/test-recordings/server-render-xxx.mp4","hasAudio":true}
        "400":
          description: No project saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No project saved. Call /api/save-project first.
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Rate limit exceeded — too many render requests
                  retryAfter:
                    type: number

  /api/save-project:
    post:
      summary: Save project
      description: Saves the current project JSON to a temp file for later rendering.
      operationId: postSaveProject
      tags:
        - Project
      parameters:
        - name: id
          in: query
          description: Optional project ID for named project files
          required: false
          schema:
            type: string
      requestBody:
        description: Project JSON data
        required: true
        content:
          application/json:
            schema:
              type: object
              description: The project data to save
      responses:
        "200":
          description: Project saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  path:
                    type: string
                    example: /tmp/autotube-project.json
                required:
                  - ok
                  - path
        "500":
          description: Failed to save project
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/render-video:
    post:
      summary: Frame-based video renderer
      description: >
        Accepts PNG frames from the browser and assembles them into a video using ffmpeg.
        Bypasses canvas taint restrictions.
      operationId: postRenderVideo
      tags:
        - Render
      requestBody:
        description: Frames and rendering options
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                frames:
                  type: array
                  items:
                    type: string
                    description: Base64-encoded PNG frames (data:image/png;base64,...)
                  description: Array of PNG frame data URLs
                fps:
                  type: number
                  default: 30
                  description: Frames per second
                format:
                  type: string
                  enum: [mp4, webm]
                  default: webm
                  description: Output video format
              required:
                - frames
      responses:
        "200":
          description: Rendered video file
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            video/webm:
              schema:
                type: string
                format: binary
        "500":
          description: Rendering failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/render-output/{format}/{path}:
    get:
      summary: Serve rendered output files
      description: >
        Serves rendered video files from test-recordings/ with Range request support
        for efficient video streaming (seeking, buffering).
      operationId: getRenderOutput
      tags:
        - Render
      parameters:
        - name: format
          in: path
          required: true
          description: Video format (mp4 or webm)
          schema:
            type: string
            enum: [mp4, webm]
        - name: path
          in: path
          required: true
          description: Relative path to the file within test-recordings/
          schema:
            type: string
      responses:
        "200":
          description: Full video file
          headers:
            Accept-Ranges:
              schema:
                type: string
                example: bytes
            Content-Length:
              schema:
                type: number
          content:
            video/mp4:
              schema:
                type: string
                format: binary
            video/webm:
              schema:
                type: string
                format: binary
        "206":
          description: Partial content (Range request)
          headers:
            Content-Range:
              schema:
                type: string
                example: bytes 0-1023/50000
            Accept-Ranges:
              schema:
                type: string
                example: bytes
            Content-Length:
              schema:
                type: number
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "404":
          description: File not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: File not found
        "416":
          description: Range not satisfiable

  /api/export-project:
    get:
      summary: Export project
      description: Exports the saved project JSON. Optionally by project ID.
      operationId: getExportProject
      tags:
        - Project
      parameters:
        - name: id
          in: query
          description: Optional project ID
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Project JSON data
          content:
            application/json:
              schema:
                type: object
                description: The saved project data
        "404":
          description: No project saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: No project saved yet.
        "500":
          description: Export failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /api/search:
    get:
      summary: Image search
      description: DuckDuckGo image search proxy for finding images by query.
      operationId: getSearch
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    url:
                      type: string
                    thumbnail:
                      type: string
                    width:
                      type: number
                    height:
                      type: number
        "400":
          description: Missing query parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing query parameter "q"
        "500":
          description: Search failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Search failed
                  details:
                    type: string

  /api/search-videos:
    get:
      summary: Video search
      description: DuckDuckGo video search proxy for finding videos by query.
      operationId: getSearchVideos
      tags:
        - Search
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
      responses:
        "200":
          description: Video search results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      type: string
                    url:
                      type: string
                    thumbnail:
                      type: string
                    duration:
                      type: string
        "400":
          description: Missing query parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing query parameter "q"
        "500":
          description: Video search failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Video search failed
                  details:
                    type: string

  /api/download-clip:
    get:
      summary: Download video clip
      description: >
        Downloads and trims a video clip from a URL using yt-dlp and ffmpeg.
        Results are cached for the lifetime of the dev server process.
      operationId: getDownloadClip
      tags:
        - Media
      parameters:
        - name: url
          in: query
          required: true
          description: Video URL to download from
          schema:
            type: string
        - name: duration
          in: query
          description: Duration of the clip in seconds (default: 10)
          required: false
          schema:
            type: number
            default: 10
      responses:
        "200":
          description: Video clip (MP4)
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        "400":
          description: Missing URL parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing url parameter
        "500":
          description: Clip download failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Clip download failed
                  details:
                    type: string

  /api/proxy-image:
    get:
      summary: Proxy image
      description: >
        Proxies an image URL to eliminate CORS and canvas-taint issues.
        Sets Cache-Control for 24 hours.
      operationId: getProxyImage
      tags:
        - Media
      parameters:
        - name: url
          in: query
          required: true
          description: URL of the image to proxy
          schema:
            type: string
      responses:
        "200":
          description: The proxied image
          content:
            image/*:
              schema:
                type: string
                format: binary
        "400":
          description: Missing URL parameter
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Missing url parameter
        "500":
          description: Image proxy failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Image proxy failed

tags:
  - name: System
    description: Health and monitoring endpoints
  - name: Render
    description: Video rendering and output endpoints
  - name: Project
    description: Project save and export endpoints
  - name: Search
    description: Image and video search endpoints
  - name: Media
    description: Image proxy and clip download endpoints
