[phases.setup]
nixPkgs = [
  "ffmpeg",
  "chromium",
  "cairo",
  "pango",
  "libjpeg",
  "giflib",
  "librsvg",
  "pkg-config",
  "pixman",
  "python3",
  "python3Packages.pip"
]

[phases.install]
# Symlink before npm ci — survives if scripts/ is omitted from the image
cmds = [
  "if [ -d deploy/server-render ] && [ ! -e server-render ]; then ln -sfn deploy/server-render server-render; fi",
  "pip install --break-system-packages edge-tts==7.0.2",
  "npm ci"
]
# Don't cache node_modules — avoids huge stale layers on snapshot upload
cacheDirectories = ["~/.npm"]

[phases.build]
# Reinstall prod-only deps after vite — smaller snapshot than npm prune (which hung on Railway)
cmds = [
  "NODE_OPTIONS=--max-old-space-size=3072 npm run build",
  "rm -rf node_modules",
  "npm ci --omit=dev",
  "node deploy/bootstrap-server-render.mjs"
]

[variables]
PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
CHROME_BIN = "/usr/bin/chromium"
NODE_OPTIONS = "--max-old-space-size=3072"
NPM_CONFIG_PRODUCTION = "false"
